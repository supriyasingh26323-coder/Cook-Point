<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register - Cook Point</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body class="form-page">

  <div class="form-box">
    <h2>🍔 Create Account</h2>
    <p class="sub">Join Cook Point and start ordering!</p>

    <div class="alert" id="regAlert"></div>

    <form id="registerForm">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="name" placeholder="Enter your full name" required/>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="Enter your email" required/>
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input type="text" name="phone" placeholder="Enter your phone number"/>
      </div>
      <div class="form-group">
        <label>Delivery Address</label>
        <textarea name="address" rows="2" placeholder="Enter your delivery address"></textarea>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Create a password" required/>
      </div>
      <button type="submit" class="btn-primary btn-block">Create Account →</button>
    </form>

    <p class="form-link">Already have an account? <a href="login.html">Login here</a></p>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
