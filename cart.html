<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cart - Cook Point</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="logo">Cook <span>Point</span></a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="menu.html">Menu</a></li>
      <li><a href="login.html">Login</a></li>
      <li><a href="register.html">Register</a></li>
    </ul>
    <a href="cart.html" class="cart-icon">🛒 <span class="cart-count">0</span></a>
  </nav>

  <section class="section">
    <h2 class="section-title">Your <span>Cart</span></h2>
    <p class="section-sub">Review your items before placing the order</p>
    <div class="cart-container">
      <table class="cart-table">
        <thead>
          <tr>
            <th>Item</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Subtotal</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="cartBody"></tbody>
      </table>
      <div id="cartSummary" class="cart-summary" style="display:none;"></div>
    </div>
  </section>

  <footer>
    <p>© 2025 <span>Cook Point</span>. All rights reserved.</p>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
