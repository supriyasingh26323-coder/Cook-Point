<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Checkout - Cook Point</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="logo">Cook <span>Point</span></a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="menu.html">Menu</a></li>
      <li><a href="cart.html">Cart</a></li>
    </ul>
    <a href="cart.html" class="cart-icon">🛒 <span class="cart-count">0</span></a>
  </nav>

  <section class="section">
    <h2 class="section-title">Place Your <span>Order</span></h2>
    <p class="section-sub">Fill in your details and confirm the order</p>

    <div class="checkout-container">
      <div class="checkout-box">

        <h3 style="margin-bottom:15px;color:#1a1a2e;">📋 Order Summary</h3>
        <ul class="order-summary-list" id="orderList"></ul>
        <div class="order-total" id="orderTotal"></div>

        <form id="checkoutForm" method="POST" action="php/place_order.php" style="margin-top:30px;">
          <input type="hidden" name="total" id="cartTotal"/>
          <div class="form-group">
            <label>Delivery Address</label>
            <textarea name="address" rows="3" placeholder="Enter your full delivery address" required></textarea>
          </div>
          <div class="form-group">
            <label>Payment Method</label>
            <select name="payment">
              <option value="cod">Cash on Delivery</option>
            </select>
          </div>
          <button type="submit" class="btn-primary btn-block" style="margin-top:10px;">✅ Confirm Order</button>
        </form>

      </div>
    </div>
  </section>

  <footer>
    <p>© 2025 <span>Cook Point</span>. All rights reserved.</p>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
